      <rect x="0" y="0" width="8" height="8" fill="#00cc44"/>
      <rect x="56" y="0" width="8" height="8" fill="#00cc44"/>
      <rect x="8" y="8" width="8" height="8" fill="#00cc44"/>
      <rect x="48" y="8" width="8" height="8" fill="#00cc44"/>
