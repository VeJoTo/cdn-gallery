  <!-- ===== TITLE "GALAGA" ===== -->
  <g filter="url(#textGlow)">
    <!-- G -->
    <g fill="url(#titleGrad)">
      <rect x="100" y="70" width="80" height="16" rx="2"/>
      <rect x="100" y="70" width="16" height="80" rx="2"/>
      <rect x="100" y="134" width="80" height="16" rx="2"/>
      <rect x="164" y="110" width="16" height="40" rx="2"/>
      <rect x="140" y="110" width="40" height="16" rx="2"/>
    </g>
    <!-- A -->
    <g fill="url(#titleGrad)">
      <rect x="200" y="70" width="16" height="80" rx="2"/>
      <rect x="264" y="70" width="16" height="80" rx="2"/>
      <rect x="200" y="70" width="80" height="16" rx="2"/>
      <rect x="200" y="110" width="80" height="16" rx="2"/>
    </g>
    <!-- L -->
    <g fill="url(#titleGrad)">
      <rect x="300" y="70" width="16" height="80" rx="2"/>
      <rect x="300" y="134" width="70" height="16" rx="2"/>
    </g>
    <!-- A -->
