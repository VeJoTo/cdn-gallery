      <rect x="8" y="16" width="48" height="8" fill="#44ff66"/>
      <rect x="0" y="24" width="64" height="8" fill="#00cc44"/>
      <rect x="16" y="24" width="8" height="8" fill="#fff" opacity="0.9"/>
      <rect x="40" y="24" width="8" height="8" fill="#fff" opacity="0.9"/>
      <rect x="8" y="32" width="48" height="8" fill="#44ff66"/>
      <rect x="16" y="40" width="32" height="8" fill="#00cc44"/>
    </g>
    <!-- Boss 2 -->
