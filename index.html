<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDN 3D Gallery</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <canvas id="gallery-canvas"></canvas>

  <div id="breadcrumb"></div>
  <button id="back-btn" class="hidden">← Back</button>
  <button id="inventory-btn">Inventory</button>
  <div id="hotspot-hints"></div>

  <div id="panel-drawer" class="hidden">
    <button id="drawer-close">×</button>
    <div id="drawer-content"></div>
  </div>

  <div id="gatekeeper-chat" class="hidden">
    <button id="chat-close">×</button>
    <div id="chat-messages"></div>
    <div id="chat-chips"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Ask me anything…" autocomplete="off" />
      <button id="chat-send">Send</button>
    </div>
  </div>

  <div id="inventory-overlay" class="hidden">
    <button id="inventory-close">×</button>
    <div id="inventory-content"></div>
  </div>

  <div id="book-overlay" class="hidden">
    <div id="book-container">
      <button id="book-close" class="book-close">×</button>
      <div id="book-page-left" class="book-page"></div>
      <div id="book-page-right" class="book-page"></div>
      <button id="book-prev" class="book-nav">‹</button>
      <button id="book-next" class="book-nav">›</button>
    </div>
  </div>

  <iframe
    id="tv-iframe"
    src="https://www.youtube.com/embed/BdGOuNQ_0B8?autoplay=1&mute=1&loop=1&playlist=BdGOuNQ_0B8&controls=0&rel=0&modestbranding=1&playsinline=1"
    allow="autoplay; encrypted-media; picture-in-picture"
    frameborder="0"
    allowfullscreen
  ></iframe>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
