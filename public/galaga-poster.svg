      <rect x="490" y="134" width="80" height="16" rx="2"/>
      <rect x="554" y="110" width="16" height="40" rx="2"/>
      <rect x="530" y="110" width="40" height="16" rx="2"/>
    </g>
    <!-- A -->
    <g fill="url(#titleGrad)">
      <rect x="590" y="70" width="16" height="80" rx="2"/>
      <rect x="654" y="70" width="16" height="80" rx="2"/>
      <rect x="590" y="70" width="80" height="16" rx="2"/>
      <rect x="590" y="110" width="80" height="16" rx="2"/>
    </g>
