  <!-- ===== SCORE DISPLAY ===== -->
  <text x="120" y="42" font-family="'Courier New', monospace" font-size="16" fill="#ffffff" letter-spacing="2">1UP</text>
  <text x="110" y="62" font-family="'Courier New', monospace" font-size="16" fill="#ff3333" letter-spacing="2" filter="url(#glow)">38,400</text>

  <text x="370" y="42" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ffffff" letter-spacing="2">HIGH SCORE</text>
  <text x="370" y="62" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ff3333" letter-spacing="2" filter="url(#glow)">999,999</text>

