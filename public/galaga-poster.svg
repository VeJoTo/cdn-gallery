  <!-- ===== PLAYER SHIP ===== -->
  <g transform="translate(370, 850)" filter="url(#strongGlow)">
    <rect x="24" y="0" width="8" height="8" fill="#ffffff"/>
    <rect x="16" y="8" width="24" height="8" fill="#ffffff"/>
    <rect x="16" y="16" width="24" height="8" fill="#00ccff"/>
    <rect x="8" y="24" width="40" height="8" fill="#00ccff"/>
    <rect x="0" y="32" width="56" height="8" fill="#0088cc"/>
    <rect x="0" y="40" width="8" height="8" fill="#0088cc"/>
    <rect x="24" y="40" width="8" height="8" fill="#0088cc"/>
    <rect x="48" y="40" width="8" height="8" fill="#0088cc"/>
