  <!-- Bottom decorative line -->
  <line x1="60" y1="985" x2="740" y2="985" stroke="#224488" stroke-width="1" opacity="0.4"/>

  <!-- Footer text -->
  <text x="400" y="1020" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#445588" letter-spacing="4">© 1981 NAMCO LTD.</text>
  <text x="400" y="1050" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#334466" letter-spacing="3">INSERT COIN</text>

  <!-- CRT vignette overlay -->
  <rect width="800" height="1100" fill="url(#vignette)" pointer-events="none"/>
</svg>