  <!-- Laser beam from player -->
  <rect x="397" y="580" width="3" height="270" fill="#00ffff" opacity="0.8" filter="url(#strongGlow)"/>

  <!-- Explosion effect on a hit alien -->
  <g transform="translate(389, 560)" filter="url(#strongGlow)">
    <rect x="8" y="0" width="8" height="8" fill="#ffff00" opacity="0.9"/>
    <rect x="0" y="8" width="8" height="8" fill="#ff8800" opacity="0.8"/>
    <rect x="16" y="8" width="8" height="8" fill="#ff4400" opacity="0.7"/>
    <rect x="8" y="16" width="8" height="8" fill="#ffcc00" opacity="0.9"/>
    <rect x="-8" y="16" width="8" height="8" fill="#ff6600" opacity="0.5"/>
    <rect x="24" y="0" width="8" height="8" fill="#ff6600" opacity="0.5"/>
