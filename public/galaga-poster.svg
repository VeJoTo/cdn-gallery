  <!-- Subtitle -->
  <text x="400" y="195" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#5599ff" letter-spacing="12" filter="url(#glow)">CHALLENGING STAGE</text>

  <!-- Decorative line -->
