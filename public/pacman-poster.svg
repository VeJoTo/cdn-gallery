  <text x="400" y="1050" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ff0088" letter-spacing="4" opacity="0.5">© 1980 NAMCO // NEON DISTRICT ED.</text>
  <text x="400" y="1078" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00ffcc" letter-spacing="5" filter="url(#neonCyan)" opacity="0.6">CREDIT ▮▮</text>

  <!-- Scanlines -->
