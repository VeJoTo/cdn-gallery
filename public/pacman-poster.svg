    <circle cx="440" cy="35" r="12" fill="#00ffff" filter="url(#neonCyan)"/>
    <text x="440" y="62" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#00ffff" letter-spacing="2" filter="url(#neonCyan)">&gt;INKY</text>

