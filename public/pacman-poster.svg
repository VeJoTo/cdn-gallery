    <rect x="0" y="8" width="40" height="24" fill="#ffaa00"/>
    <rect x="0" y="32" width="8" height="8" fill="#ffaa00"/>
    <rect x="16" y="32" width="8" height="8" fill="#ffaa00"/>
    <rect x="32" y="32" width="8" height="8" fill="#ffaa00"/>
    <rect x="8" y="12" width="10" height="12" fill="#fff" rx="3"/>
    <rect x="24" y="12" width="10" height="12" fill="#fff" rx="3"/>
    <rect x="10" y="16" width="6" height="8" fill="#ff4400" rx="2"/>
    <rect x="26" y="16" width="6" height="8" fill="#ff4400" rx="2"/>
  </g>

  <!-- ===== CHERRY — neon ===== -->
  <g transform="translate(385, 795)" filter="url(#neonRed)">
    <circle cx="8" cy="16" r="8" fill="#ff0044"/>
    <circle cx="22" cy="18" r="7" fill="#ff0044"/>
    <circle cx="10" cy="14" r="3" fill="#ff4488" opacity="0.6"/>
    <line x1="8" y1="8" x2="16" y2="-2" stroke="#00ff88" stroke-width="2"/>
    <line x1="22" y1="10" x2="16" y2="-2" stroke="#00ff88" stroke-width="2"/>
    <ellipse cx="20" cy="-2" rx="6" ry="3" fill="#00ffaa" opacity="0.7"/>
  </g>

  <!-- ===== GHOST LINEUP BOTTOM ===== -->
  <g transform="translate(0, 855)">
    <rect x="80" y="0" width="640" height="1" fill="#ff0088" opacity="0.3"/>
    <rect x="100" y="4" width="600" height="0.5" fill="#00ffcc" opacity="0.2"/>

    <circle cx="180" cy="35" r="12" fill="#ff2244" filter="url(#neonRed)"/>
