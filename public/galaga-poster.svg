    <circle cx="55" cy="620" r="1.3" fill="#aaf"/>
    <circle cx="180" cy="670" r="0.8" fill="#fff"/>
    <circle cx="300" cy="640" r="1" fill="#ffa"/>
    <circle cx="430" cy="690" r="1.5" fill="#fff"/>
    <circle cx="550" cy="650" r="0.7" fill="#fff"/>
    <circle cx="680" cy="700" r="1.1" fill="#aff"/>
    <circle cx="90" cy="780" r="1" fill="#fff"/>
    <circle cx="200" cy="810" r="1.2" fill="#faf"/>
    <circle cx="370" cy="770" r="0.9" fill="#fff"/>
    <circle cx="510" cy="800" r="1.4" fill="#fff"/>
    <circle cx="640" cy="830" r="1" fill="#aaf"/>
    <circle cx="740" cy="760" r="1.3" fill="#fff"/>
    <circle cx="130" cy="900" r="0.8" fill="#ffa"/>
    <circle cx="260" cy="940" r="1" fill="#fff"/>
    <circle cx="400" cy="910" r="1.1" fill="#fff"/>
    <circle cx="570" cy="950" r="1.5" fill="#aff"/>
    <circle cx="700" cy="920" r="0.7" fill="#fff"/>
    <circle cx="50" cy="1020" r="1.2" fill="#fff"/>
    <circle cx="250" cy="1050" r="1" fill="#faf"/>
