    <rect x="470" y="622" width="180" height="14" rx="3"/>
    <rect x="365" y="600" width="70" height="38" rx="3"/>

    <rect x="150" y="672" width="80" height="32" rx="3"/>
    <rect x="260" y="686" width="110" height="14" rx="3"/>
    <rect x="430" y="686" width="110" height="14" rx="3"/>
    <rect x="570" y="672" width="80" height="32" rx="3"/>

    <rect x="150" y="740" width="500" height="14" rx="3"/>
