    <circle cx="495" cy="233" r="2.5"/>
    <circle cx="515" cy="233" r="2.5"/>
    <circle cx="535" cy="233" r="2.5"/>
    <circle cx="555" cy="233" r="2.5"/>
    <circle cx="625" cy="233" r="2.5"/>
    <circle cx="645" cy="233" r="2.5"/>
    <circle cx="665" cy="233" r="2.5"/>

    <circle cx="135" cy="258" r="2.5"/>
    <circle cx="135" cy="283" r="2.5"/>
    <circle cx="135" cy="340" r="2.5"/>
    <circle cx="135" cy="365" r="2.5"/>
    <circle cx="135" cy="410" r="2.5"/>
    <circle cx="135" cy="500" r="2.5"/>
    <circle cx="135" cy="525" r="2.5"/>
    <circle cx="135" cy="550" r="2.5"/>
    <circle cx="135" cy="605" r="2.5"/>
    <circle cx="135" cy="650" r="2.5"/>
    <circle cx="135" cy="720" r="2.5"/>

    <circle cx="665" cy="258" r="2.5"/>
    <circle cx="665" cy="283" r="2.5"/>
    <circle cx="665" cy="340" r="2.5"/>
    <circle cx="665" cy="365" r="2.5"/>
    <circle cx="665" cy="410" r="2.5"/>
    <circle cx="665" cy="500" r="2.5"/>
    <circle cx="665" cy="525" r="2.5"/>
    <circle cx="665" cy="550" r="2.5"/>
    <circle cx="665" cy="605" r="2.5"/>
    <circle cx="665" cy="650" r="2.5"/>
    <circle cx="665" cy="720" r="2.5"/>

    <circle cx="245" cy="300" r="2.5"/>
    <circle cx="245" cy="350" r="2.5"/>
    <circle cx="245" cy="400" r="2.5"/>
    <circle cx="555" cy="300" r="2.5"/>
    <circle cx="555" cy="350" r="2.5"/>
    <circle cx="555" cy="400" r="2.5"/>

    <circle cx="245" cy="610" r="2.5"/>
    <circle cx="245" cy="660" r="2.5"/>
    <circle cx="555" cy="610" r="2.5"/>
    <circle cx="555" cy="660" r="2.5"/>

    <circle cx="155" cy="770" r="2.5"/>
    <circle cx="195" cy="770" r="2.5"/>
    <circle cx="235" cy="770" r="2.5"/>
    <circle cx="345" cy="770" r="2.5"/>
    <circle cx="385" cy="770" r="2.5"/>
    <circle cx="425" cy="770" r="2.5"/>
    <circle cx="535" cy="770" r="2.5"/>
    <circle cx="575" cy="770" r="2.5"/>
    <circle cx="615" cy="770" r="2.5"/>
    <circle cx="655" cy="770" r="2.5"/>
  </g>

  <!-- Power pellets — glowing magenta -->
  <g filter="url(#heavyGlow)">
    <circle cx="130" cy="295" r="8" fill="#ff00ff"/>
    <circle cx="670" cy="295" r="8" fill="#ff00ff"/>
    <circle cx="130" cy="660" r="8" fill="#ff00ff"/>
    <circle cx="670" cy="660" r="8" fill="#ff00ff"/>
  </g>

  <!-- ===== PAC-MAN — neon yellow ===== -->
  <g transform="translate(295, 545)" filter="url(#neonYellow)">
    <circle cx="24" cy="24" r="24" fill="#ffee00"/>
    <polygon points="24,24 50,8 50,40" fill="url(#bgGrad)"/>
    <circle cx="24" cy="12" r="4" fill="#000"/>
  </g>

  <!-- Dot trail -->
  <g filter="url(#neonCyan)">
    <circle cx="360" cy="569" r="2.5" fill="#00ffcc"/>
    <circle cx="380" cy="569" r="2.5" fill="#00ffcc"/>
    <circle cx="400" cy="569" r="2.5" fill="#00ffcc"/>
    <circle cx="420" cy="569" r="2.5" fill="#00ffcc"/>
    <circle cx="440" cy="569" r="2.5" fill="#00ffcc"/>
  </g>

  <!-- ===== GHOSTS — each with unique neon color ===== -->
  <!-- Blinky (neon red) -->
  <g transform="translate(350, 425)" filter="url(#neonRed)">
    <rect x="4" y="0" width="32" height="8" fill="#ff2244" rx="4"/>
    <rect x="0" y="8" width="40" height="24" fill="#ff2244"/>
    <rect x="0" y="32" width="8" height="8" fill="#ff2244"/>
    <rect x="16" y="32" width="8" height="8" fill="#ff2244"/>
    <rect x="32" y="32" width="8" height="8" fill="#ff2244"/>
    <rect x="8" y="12" width="10" height="12" fill="#fff" rx="3"/>
    <rect x="24" y="12" width="10" height="12" fill="#fff" rx="3"/>
    <rect x="12" y="16" width="6" height="8" fill="#ff00ff" rx="2"/>
    <rect x="28" y="16" width="6" height="8" fill="#ff00ff" rx="2"/>
  </g>

  <!-- Pinky (neon magenta) -->
