  <use href="#bee" x="550" y="450" filter="url(#glow)"/>
  <use href="#bee" x="600" y="450" filter="url(#glow)"/>

  <use href="#bee" x="150" y="500" filter="url(#glow)"/>
  <use href="#bee" x="200" y="500" filter="url(#glow)"/>
  <use href="#bee" x="250" y="500" filter="url(#glow)"/>
  <use href="#bee" x="300" y="500" filter="url(#glow)"/>
