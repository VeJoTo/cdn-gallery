    <rect x="4" y="0" width="32" height="8" fill="#ff44cc" rx="4"/>
    <rect x="0" y="8" width="40" height="24" fill="#ff44cc"/>
    <rect x="0" y="32" width="8" height="8" fill="#ff44cc"/>
    <rect x="16" y="32" width="8" height="8" fill="#ff44cc"/>
    <rect x="32" y="32" width="8" height="8" fill="#ff44cc"/>
    <rect x="8" y="12" width="10" height="12" fill="#fff" rx="3"/>
    <rect x="24" y="12" width="10" height="12" fill="#fff" rx="3"/>
    <rect x="10" y="16" width="6" height="8" fill="#ff00ff" rx="2"/>
    <rect x="26" y="16" width="6" height="8" fill="#ff00ff" rx="2"/>
