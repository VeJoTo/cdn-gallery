    <g id="butterfly">
      <rect x="8" y="0" width="8" height="8" fill="#ff4444"/>
      <rect x="24" y="0" width="8" height="8" fill="#ff4444"/>
      <rect x="0" y="8" width="8" height="8" fill="#ff4444"/>
      <rect x="8" y="8" width="8" height="8" fill="#ff8844"/>
      <rect x="16" y="8" width="8" height="8" fill="#ff4444"/>
      <rect x="24" y="8" width="8" height="8" fill="#ff8844"/>
      <rect x="32" y="8" width="8" height="8" fill="#ff4444"/>
      <rect x="0" y="16" width="40" height="8" fill="#ff4444"/>
      <rect x="8" y="16" width="8" height="8" fill="#ffcc00"/>
      <rect x="24" y="16" width="8" height="8" fill="#ffcc00"/>
      <rect x="8" y="24" width="24" height="8" fill="#ff8844"/>
      <rect x="0" y="32" width="8" height="8" fill="#ff4444"/>
      <rect x="32" y="32" width="8" height="8" fill="#ff4444"/>
    </g>
  </g>
